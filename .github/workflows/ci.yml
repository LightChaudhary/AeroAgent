name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff>=0.6.0

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      # torch/chromadb/sentence-transformers are heavy — cache pip to keep CI fast
      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v --tb=short

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only — no push yet. Layer cache via GitHub Actions cache backend
      # speeds up rebuilds since your Dockerfile installs heavy deps (torch etc).
      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: aeroagent-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sanity-check image (import check)
        run: |
          docker run --rm aeroagent-app:ci python -c "import aeroagent; print('aeroagent import OK')"
services:
  ollama:
    image: ollama/ollama:latest
    container_name: aeroagent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: aeroagent-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - AEROAGENT_MODEL=llama3.2:3b
    volumes:
      - ./traces:/app/traces
      - memory_db:/app/data/memory
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  memory_db:
